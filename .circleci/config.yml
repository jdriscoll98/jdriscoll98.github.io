version: 2.1
jobs:
  build:
    docker: 
      - image: circleci/node:4.8.2 # the primary container, where your job's commands are run
    steps:
      - checkout # check out the code in the project directory
      - run: echo "hello world" # run the `echo` command
  deploy:
    machine:
      enabled: true
    steps:
      - add_ssh_keys:
          fingerprints:
            - "0c:76:07:aa:f4:ae:fc:dc:5e:c4:b9:23:cb:48:66:da"
      -  run:
           name: Deploy Over SSH
           command: |
             ssh $SSH_USER@$SSH_HOST "cd /srv/webroot/jdriscoll98.github.io && git pull && systemctl restart nginx"
workflows:
   version: 2
   build-and-deploy:
     jobs:
       - build
       - deploy:
           requires:
             - build
           filters:
             branches:
               only: master 
