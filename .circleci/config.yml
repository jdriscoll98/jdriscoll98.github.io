version: 2.1
jobs:
  build:
    docker: 
      - image: circleci/node:4.8.2 # the primary container, where your job's commands are run
    steps:
      - checkout # check out the code in the project directory
      - run: echo "hello world" # run the `echo` command
  deploy:
    machine:
      enabled: true
    steps:
      -  run:
           name: Deploy Over SSH
           command: |
             ssh $SSH_USER@$SSH_HOST && cd /srv/webroot/jdriscoll98.github.io && git pull
workflows:
   version: 2
   build-and-deploy:
     jobs:
       - build
       - deploy:
           requires:
             - build
           filters:
             branches:
               only: master 
